<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clone YouTube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Barra Superior -->
    <header class="topo">
        <div class="logo">
            <span class="menu-icon">☰</span>
            <h2>YouTube</h2>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Pesquisar">
            <button>🔍</button>
        </div>

        <div class="user-icons">
            <span>🎥</span>
            <span>🔔</span>
            <span class="profile">U</span>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="videos">
        
        <div class="video-card">
            <img src="https://picsum.photos/300/180?1">
            <h4>Título do Vídeo</h4>
            <p>Canal Exemplo • 1 mi visualizações</p>
        </div>

        <div class="video-card">
            <img src="https://picsum.photos/300/180?2">
            <h4>Aprendendo HTML</h4>
            <p>Curso Web • 500 mil visualizações</p>
        </div>

        <div class="video-card">
            <img src="https://picsum.photos/300/180?3">
            <h4>CSS Moderno</h4>
            <p>Dev Front • 200 mil visualizações</p>
        </div>

        <div class="video-card">
            <img src="https://picsum.photos/300/180?4">
            <h4>JavaScript Fácil</h4>
            <p>Programação • 800 mil visualizações</p>
        </div>

    </main>

</body>
</html>
