<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Clone</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<header class="navbar">

<div class="logo">
<h2>Instagram</h2>
</div>

<div class="search">
<input type="text" placeholder="Pesquisar">
</div>

<div class="icons">
<i class="fa-regular fa-heart"></i>
<i class="fa-regular fa-paper-plane"></i>
<i class="fa-regular fa-user"></i>
</div>

</header>

<main class="feed">

<div class="post">

<div class="post-header">
<img src="pexels-marcia-otto-1382690-36391549.jpg">
<span>RosY_</span>
</div>

<img class="post-img" src="alexander-lunyov-wZ7DuBV8JlQ-unsplash.jpg">

<div class="post-icons">
<i class="fa-regular fa-heart"></i>
<i class="fa-regular fa-comment"></i>
<i class="fa-regular fa-paper-plane"></i>
</div>

<p class="caption">
<b>RosY_</b> Curtindo o dia ☀️
</p>

</div>

<div class="post">

<div class="post-header">
<img src="alexey-demidov-0mHFjEF-nck-unsplash.jpg">
<span>M4rc._</span>
</div>

<video class="post-video" loop muted controls>
<source src="14982332_3840_2160_30fps.mp4" type="video/mp4">
</video>

<div class="post-icons">
<i class="fa-regular fa-heart"></i>
<i class="fa-regular fa-comment"></i>
<i class="fa-regular fa-paper-plane"></i>
</div>

<p class="caption">
<b>M4rc._</b> Olha esse vídeo incrível 🎥
</p>

</div>

<div class="post">

<div class="post-header">
<img src="pexels-moph-31861864.jpg">
<span>Car0L</span>
</div>

<img class="post-img" src="pexels-262756269-36076131.jpg">

<div class="post-icons">
<i class="fa-regular fa-heart"></i>
<i class="fa-regular fa-comment"></i>
<i class="fa-regular fa-paper-plane"></i>
</div>

<p class="caption">
<b>Car0L</b> Foto nova 😎
</p>

</div>


</main>

</body>
</html>
