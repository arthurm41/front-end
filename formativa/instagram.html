<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Clone</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
border-bottom:1px solid #222;
}

.search input{
padding:7px;
border-radius:8px;
border:none;
background:#262626;
color:white;
}

/* LAYOUT */

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
}

.feed{
width:470px;
}

/* STORIES */

.stories{
display:flex;
gap:15px;
background:#111;
padding:15px;
border-radius:10px;
margin-bottom:20px;
overflow-x:auto;
}

.story{
text-align:center;
font-size:12px;
}

.story img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #ff0066;
padding:2px;
}

/* POST */

.post{
background:#111;
border:1px solid #222;
border-radius:8px;
margin-bottom:25px;
overflow:hidden;
}

.post-header{
display:flex;
align-items:center;
padding:10px;
}

.post-header img{
width:35px;
height:35px;
border-radius:50%;
margin-right:10px;
}

.post-img{
width:100%;
}

/* CARROSSEL */

.carousel{
position:relative;
overflow:hidden;
}

.carousel-track{
display:flex;
transition:transform 0.5s ease;
}

.carousel-track img{
width:100%;
flex-shrink:0;
}

.carousel button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
border:none;
color:white;
padding:8px 10px;
cursor:pointer;
}

.prev{ left:10px }
.next{ right:10px }

/* YOUTUBE */

.youtube-video iframe{
width:100%;
height:300px;
border:none;
}

/* ICONES */

.post-icons{
padding:10px;
}

.post-icons i{
margin-right:10px;
font-size:20px;
cursor:pointer;
}

.caption{
padding:0 10px 15px;
font-size:14px;
}

.verified{
color:#3ea6ff;
font-size:13px;
margin-left:5px;
}

/* SIDEBAR */

.sidebar{
width:300px;
}

.profile{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.profile img{
width:45px;
height:45px;
border-radius:50%;
}

.suggestion{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.follow{
color:#3ea6ff;
cursor:pointer;
}

</style>
</head>

<body>

<header class="navbar">

<h2 style="font-family:cursive;">Instagram</h2>

<div class="search">
<input type="text" placeholder="Pesquisar">
</div>

</header>

<div class="container">

<!-- FEED -->

<div class="feed">

<!-- STORIES -->

<div class="stories">

<div class="story">
<img src="lebron.jpg">
<p>lebron</p>
</div>

<div class="story">
<img src="ShaiG.jpg">
<p>shai</p>
</div>

<div class="story">
<img src="ufc.jpg">
<p>ufc</p>
</div>

</div>

<!-- POST 1 CARROSSEL -->

<div class="post">

<div class="post-header">
<img src="lebron.jpg">
<span>lebron <i class="fa-solid fa-circle-check verified"></i></span>
</div>

<div class="carousel">

<div class="carousel-track">
<img src="Lebroon.png">
<img src="Lebrooon.png">
<img src="Lebroooooooon.png">
</div>

<button class="prev"><i class="fa-solid fa-chevron-left"></i></button>
<button class="next"><i class="fa-solid fa-chevron-right"></i></button>

</div>

<div class="post-icons">
<i class="fa-regular fa-heart"></i>
<i class="fa-regular fa-comment"></i>
<i class="fa-regular fa-paper-plane"></i>
</div>

<p class="caption">
<b>Luka Doncic</b> LeBron James is the GOAT 🐐
</p>

</div>

<!-- POST 2 VIDEO -->

<div class="post">

<div class="post-header">
<img src="ufc.jpg">
<span>UFC <i class="fa-solid fa-circle-check verified"></i></span>
</div>

<div class="youtube-video">
<iframe src="https://www.youtube.com/embed/VhJlkRKFT9Y"></iframe>
</div>

<div class="post-icons">
<i class="fa-regular fa-heart"></i>
<i class="fa-regular fa-comment"></i>
<i class="fa-regular fa-paper-plane"></i>
</div>

<p class="caption">
<b>UFC</b> Israel Adesanya vs Alex Pereira
</p>

</div>

<!-- POST 3 IMAGEM -->

<div class="post">

<div class="post-header">
<img src="ShaiG.jpg">
<span>Shai <i class="fa-solid fa-circle-check verified"></i></span>
</div>

<img class="post-img" src="shai.png">

<div class="post-icons">
<i class="fa-regular fa-heart"></i>
<i class="fa-regular fa-comment"></i>
<i class="fa-regular fa-paper-plane"></i>
</div>

<p class="caption">
<b>NBA</b> Shai recorde histórico 🔥
</p>

</div>

</div>



<script>

const track = document.querySelector(".carousel-track")
const next = document.querySelector(".next")
const prev = document.querySelector(".prev")
const images = document.querySelectorAll(".carousel-track img")

let index = 0

function updateCarousel(){
const width = images[0].clientWidth
track.style.transform = `translateX(-${width * index}px)`
}

next.onclick = () => {
if(index < images.length - 1){
index++
updateCarousel()
}
}

prev.onclick = () => {
if(index > 0){
index--
updateCarousel()
}
}

</script>

</body>
</html>
